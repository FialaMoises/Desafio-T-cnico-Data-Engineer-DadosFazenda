version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sncr-postgres
    environment:
      POSTGRES_DB: sncr
      POSTGRES_USER: sncr_user
      POSTGRES_PASSWORD: sncr_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sncr_user -d sncr"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sncr-network

  extractor:
    build:
      context: .
      dockerfile: Dockerfile.extractor
    container_name: sncr-extractor
    volumes:
      - ./extractor/output:/app/extractor/output
      - ./extractor/checkpoints:/app/extractor/checkpoints
      - ./extractor/logs:/app/extractor/logs
    environment:
      SNCR_BASE_URL: https://data-engineer-challenge-production.up.railway.app
      SNCR_DELAY_SECONDS: 0.5
      MAX_RETRIES: 3
    networks:
      - sncr-network
    command: python -m extractor.main --ufs SP MG GO

  loader:
    build:
      context: .
      dockerfile: Dockerfile.loader
    container_name: sncr-loader
    volumes:
      - ./extractor/output:/app/extractor/output
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: sncr
      POSTGRES_USER: sncr_user
      POSTGRES_PASSWORD: sncr_pass
    depends_on:
      postgres:
        condition: service_healthy
      extractor:
        condition: service_completed_successfully
    networks:
      - sncr-network
    command: python -m loader.main --input-dir extractor/output

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sncr-api
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: sncr
      POSTGRES_USER: sncr_user
      POSTGRES_PASSWORD: sncr_pass
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      loader:
        condition: service_completed_successfully
    networks:
      - sncr-network
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:

networks:
  sncr-network:
    driver: bridge
