version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sncr-postgres
    environment:
      POSTGRES_DB: sncr
      POSTGRES_USER: sncr_user
      POSTGRES_PASSWORD: sncr_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sncr_user -d sncr"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sncr-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sncr-api
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: sncr
      POSTGRES_USER: sncr_user
      POSTGRES_PASSWORD: sncr_pass
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sncr-network
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  extractor:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./extractor/output:/app/extractor/output
      - ./extractor/checkpoint.json:/app/extractor/checkpoint.json
    networks:
      - sncr-network
    command: python -m extractor.main

  loader:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: sncr
      POSTGRES_USER: sncr_user
      POSTGRES_PASSWORD: sncr_pass
    volumes:
      - ./extractor/output:/app/extractor/output:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sncr-network
    command: python -m loader.main

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sncr-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - sncr-network

volumes:
  postgres_data:

networks:
  sncr-network:
    driver: bridge
